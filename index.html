<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/fontAwesome.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
     <link rel="stylesheet" href="css/index.css">
     <link rel="stylesheet" href="css/bootstrap.css">
     <link rel="stylesheet" href="css/animate.css"> 
     <script src="js/bundle.js"></script>
     <script src="js/sweetalert.js"></script>
    <title>homepage</title>
</head>
<body>
    <nav class="navbar navbar-expand-md bg-light shadow-lg fixed-top navbar-light">    
    <div class="container-fluid">
        <img src="images/logo.png" class="rounded-circle" width="60" alt="">
        <a href="#" class="text-white navbar-brand">
            BHL Booking Management System
        </a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#mymenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="navbar-collapse collapse" id="mymenu"></div>
        <ul class="navbar-nav w-100 justify-content-end">
            <li class="nav-item mx-3 fw-bold text-white">
                 </li>
            </ul>
        </nav>
        <br><br>
        <div class="container mt-5">
        <div class="row">
            <div class="col-md-6">
                <ul class="nav nav-tabs">
                    <li class="nav-item">
                        <a href="#Signup" class="nav-link" data-bs-toggle="tab">
                            Signup
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#Login" class="nav-link active" data-bs-toggle="tab">
                            Login
                        </a>
                    </li>
                 </ul>
                 <div class="tab-content">
                    <div class="tab-pane container mt-3" id="Signup">
                         <form class="reg-form"> 
                        <input required name="fullname" type="text" placeholder="Fullname" class="mb-3 form-control">
                        <input required name="cottageName" type="text" placeholder="Cottage Name" class="mb-3 form-control">
                        <input required name="totalRoom" type="number" placeholder="Available Rooms" class="mb-3 form-control">
                        <input required name="mobile" type="number" placeholder="Mobile" class="mb-3 form-control">
                        <input required name="email" type="email" placeholder="Email" class="mb-3 form-control">
                        <input required name="password" type="password" placeholder="Password" class="mb-3 form-control">
                        <button type="submit"class="btn btn-primary">Register</button>
                        </form>
                    </div>
                    <div class="tab-pane active container mt-3" id="Login">
                        <form class="login-form">
                        <input type="email" placeholder="Email" class="mb-3 form-control">
                        <input type="password" placeholder="Password" class="mb-3 form-control">
                        <button type="submit" class="btn btn-primary">Login</button>    
                        </form>
                    </div>   
                 </div>
            </div>
            <div class="d-flex justify-content-center align-items-center col-md-6 mt-5">
                <img src="images/billa.jpg" class="w-100" alt="">

            </div>
        </div>
    </div>
    <script src="js/index.js"></script>
</body>
</html>
